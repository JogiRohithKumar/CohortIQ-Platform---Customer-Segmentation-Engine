version: '3.8'
services:
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cohort_iq_db
      POSTGRES_PASSWORD: enterprise_secure_pass
    ports:
      - "5432:5432"

  backend:
    build: ./core-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:enterprise_secure_pass@database:5432/cohort_iq_db
    depends_on:
      - database

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend